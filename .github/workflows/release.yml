name: Release

# Builds a self-contained Windows x64 single-file build of the editor and
# publishes it as a GitHub Release asset.
#
# Two ways to cut a release:
#   1. Push a tag like  v0.3.0   ->  release is created for that tag.
#   2. Run this workflow manually (Actions tab -> Release -> Run workflow) and
#      type a version such as  v0.3.0-test  ->  a tag + release are created from
#      the current commit. Handy for ad-hoc test builds.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.3.0)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write   # required to create the GitHub Release / tag

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.vbproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/', ''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          $nov = $v.TrimStart('v')
          if (-not ($nov -match '^\d+\.\d+')) { $nov = '0.0.0' }   # assembly version must be numeric
          "version=$v"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version_nov=$nov" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building release $v (assembly version $nov)"

      # Stamp the release version into the assembly so the splash / About box show it instead of
      # the hardcoded AssemblyInfo value. GenerateAssemblyInfo is off, so rewrite AssemblyInfo.vb.
      - name: Stamp version into AssemblyInfo
        shell: pwsh
        run: |
          $core = ("${{ steps.ver.outputs.version_nov }}" -split '-')[0]
          $parts = @($core.Split('.'))
          while ($parts.Count -lt 4) { $parts += '0' }
          $v4 = ($parts[0..3] -join '.')
          Write-Host "Stamping assembly version $v4"
          $f = 'GUI/My Project/AssemblyInfo.vb'
          (Get-Content $f) -replace 'AssemblyVersion\("[^"]*"\)', "AssemblyVersion(""$v4"")" -replace 'AssemblyFileVersion\("[^"]*"\)', "AssemblyFileVersion(""$v4"")" | Set-Content $f

      # Two single-file builds (no trimming - WinForms relies on reflection):
      #  - framework-dependent: small, needs the .NET 9 Desktop Runtime installed.
      #  - self-contained: large, bundles the runtime, no install needed.
      - name: Publish framework-dependent (small, needs .NET Desktop Runtime)
        run: >
          dotnet publish "GUI/GUI.vbproj"
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          -p:Version=${{ steps.ver.outputs.version_nov }}
          --output publish/framework-dependent

      - name: Publish self-contained (large, no install needed)
        run: >
          dotnet publish "GUI/GUI.vbproj"
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -p:Version=${{ steps.ver.outputs.version_nov }}
          --output publish/self-contained

      - name: Stage sample config + package both zips
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          foreach ($flavour in 'framework-dependent', 'self-contained') {
            if (Test-Path 'GUI/XMLEditorInit.xml') {
              Copy-Item 'GUI/XMLEditorInit.xml' "publish/$flavour/XMLEditorInit.sample.xml"
            }
            Write-Host "== $flavour =="
            Get-ChildItem "publish/$flavour" | Select-Object Name, Length | Format-Table -AutoSize
          }
          Compress-Archive -Path 'publish/framework-dependent/*' -DestinationPath "JA2-XML-Editor-$v-win-x64-framework-dependent.zip" -Force
          Compress-Archive -Path 'publish/self-contained/*'      -DestinationPath "JA2-XML-Editor-$v-win-x64-self-contained.zip"      -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: JA2 XML Editor ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            JA2-XML-Editor-${{ steps.ver.outputs.version }}-win-x64-framework-dependent.zip
            JA2-XML-Editor-${{ steps.ver.outputs.version }}-win-x64-self-contained.zip
          body: |
            Windows x64 builds of the JA2 1.13 XML Editor. Pick one:

            - **framework-dependent** (`…-framework-dependent.zip`, ~2 MB) — small; requires the
              [.NET 9 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/9.0) installed.
            - **self-contained** (`…-self-contained.zip`, ~50 MB) — larger, but runs with no .NET install.

            Unzip and run `XML Editor.exe` from your game's tools directory next to your
            `XMLEditorInit.xml` (a sample `XMLEditorInit.sample.xml` is included).
