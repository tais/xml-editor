name: Release

# Builds a self-contained Windows x64 single-file build of the editor and
# publishes it as a GitHub Release asset.
#
# Two ways to cut a release:
#   1. Push a tag like  v0.3.0   ->  release is created for that tag.
#   2. Run this workflow manually (Actions tab -> Release -> Run workflow) and
#      type a version such as  v0.3.0-test  ->  a tag + release are created from
#      the current commit. Handy for ad-hoc test builds.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.3.0)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write   # required to create the GitHub Release / tag

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.vbproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/', ''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          $nov = $v.TrimStart('v')
          if (-not ($nov -match '^\d+\.\d+')) { $nov = '0.0.0' }   # assembly version must be numeric
          "version=$v"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version_nov=$nov" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building release $v (assembly version $nov)"

      # Self-contained single-file => the tester needs NO .NET install on their
      # Windows box. No trimming (WinForms relies on reflection).
      - name: Publish (win-x64, self-contained, single file)
        run: >
          dotnet publish "GUI/GUI.vbproj"
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version_nov }}
          --output publish/win-x64

      - name: Stage sample config alongside the exe
        shell: pwsh
        run: |
          if (Test-Path 'GUI/XMLEditorInit.xml') {
            Copy-Item 'GUI/XMLEditorInit.xml' 'publish/win-x64/XMLEditorInit.sample.xml'
          }

      - name: Package zip
        id: zip
        shell: pwsh
        run: |
          $name = "JA2-XML-Editor-${{ steps.ver.outputs.version }}-win-x64.zip"
          Compress-Archive -Path 'publish/win-x64/*' -DestinationPath $name -Force
          "asset=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: JA2 XML Editor ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.asset }}
          body: |
            Windows x64 build of the JA2 1.13 XML Editor.

            **Self-contained** — no .NET runtime install required. Unzip and run `XML Editor.exe`
            from your game's tools directory next to your `XMLEditorInit.xml`
            (a sample `XMLEditorInit.sample.xml` is included).
