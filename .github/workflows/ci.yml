name: CI

# Builds the solution on every push/PR so breakage is caught early.
# The app is WinForms on a net*-windows TFM, so it can ONLY build on Windows.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.vbproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore XMLEditor_VS2010.sln

      # Always Release: the Debug config of GUI.vbproj historically redirected
      # OutputPath into a game folder, so Release is the clean, portable config.
      - name: Build (Release)
        run: dotnet build XMLEditor_VS2010.sln --configuration Release --no-restore
