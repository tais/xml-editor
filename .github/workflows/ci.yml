name: CI

# Builds + publishes the app on every push/PR so breakage is caught early and a
# testable Windows build is available to download without cutting a release.
# The app is WinForms on a net*-windows TFM, so it can ONLY build on Windows.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.vbproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore XMLEditor_VS2010.sln

      # Build the whole solution (fast fail on compile errors). Release config
      # avoids the Debug-only OutputPath the project historically carried.
      - name: Build (Release)
        run: dotnet build XMLEditor_VS2010.sln --configuration Release --no-restore

      # Run the exact same two publishes the Release workflow uses, so both the
      # framework-dependent and self-contained single-file paths are proven on every push/PR.
      - name: Publish framework-dependent
        run: >
          dotnet publish "GUI/GUI.vbproj"
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:DebugType=embedded
          --output publish/framework-dependent

      - name: Publish self-contained
        run: >
          dotnet publish "GUI/GUI.vbproj"
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          --output publish/self-contained

      - name: Stage sample config + list both outputs
        shell: pwsh
        run: |
          foreach ($flavour in 'framework-dependent', 'self-contained') {
            if (Test-Path 'GUI/XMLEditorInit.xml') {
              Copy-Item 'GUI/XMLEditorInit.xml' "publish/$flavour/XMLEditorInit.sample.xml"
            }
            Write-Host "== $flavour =="
            Get-ChildItem "publish/$flavour" | Select-Object Name, Length | Format-Table -AutoSize
          }

      # Upload the small framework-dependent build for quick PR testing (the
      # self-contained one is large; it's validated above and shipped on release).
      - name: Upload build artifact (framework-dependent)
        uses: actions/upload-artifact@v4
        with:
          name: xml-editor-win-x64-framework-dependent
          path: publish/framework-dependent/
          retention-days: 14
          if-no-files-found: error
